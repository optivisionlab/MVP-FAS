version: '3'
services:
  vft-fas:
    image: vft-fas-v2:latest
    volumes:
      - ./runs:/app/sources/runs
      - ./logs:/app/sources/logs
    logging:
      driver: local
      options:
        max-size: 50m
        max-file: "3"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - BACKBONE=ViT-B/16
      - WEIGHT=runs/weights/MVP_FAS_ViT-B-16_best_ckpt_260313.pt
      - DEVICE=0
      - HOST=0.0.0.0
      - PORT=2202
      - IMG_MODE=.jpg,.png,.JPEG,.jpeg,.jfif
      - IPHONE_MODE=.heic
    ports:
      - "2202:2202"
    expose:
      - '2202'
    command: ["python", "app.py"]
